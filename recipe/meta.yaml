{% set name = "sqlalchemy-drill" %}
{% set version = "1.1.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sqlalchemy_drill-{{ version }}.tar.gz
  sha256: a6bdf3e9999abbb38f5a1502e5539e52ea6556e801cf5db26c92c300d02d2f3a

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - ijson
    - requests
    - sqlalchemy

test:
  imports:
    - sqlalchemy_drill
    - sqlalchemy_drill.drilldbapi
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/JohnOmernik/sqlalchemy-drill
  summary: Apache Drill for SQLAlchemy
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/JohnOmernik/sqlalchemy-drill

extra:
  recipe-maintainers:
    - xylar
